global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'ai-lama-spring'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: [ 'host.docker.internal:8080' ]
        labels:
          application: 'ai-lama-spring'

  - job_name: 'ollama'
    metrics_path: '/metrics'
    static_configs:
      - targets: [ 'ollama:11434' ]
