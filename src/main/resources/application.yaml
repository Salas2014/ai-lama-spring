spring:
  application:
    name: ai-lama-spring
  ai:
    ollama:
      base-url: http://localhost:11434
      chat:
        model: llama3.2

management:
  endpoints:
    web:
      exposure:
        include: "health,info,metrics,prometheus"
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: "${spring.application.name}"